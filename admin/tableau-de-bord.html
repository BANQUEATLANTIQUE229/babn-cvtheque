<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord RH | BABN CVthèque</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background: var(--marine-50); }

  .barre-admin {
    background: var(--marine-950);
    border-bottom: 3px solid var(--or-500);
    padding: 18px 0;
  }
  .barre-admin .container { display: flex; justify-content: space-between; align-items: center; }
  .barre-admin .marque { display: flex; align-items: center; gap: 14px; }
  .barre-admin .marque-sigle { width: 40px; height: 40px; font-size: 15px; }
  .barre-admin .titre-page { color: var(--blanc); font-family: var(--display); font-size: 16px; font-weight: 600; }
  .barre-admin .sous-titre { color: rgba(255,255,255,0.5); font-size: 12px; font-family: var(--mono); }
  .btn-deconnexion {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--blanc);
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 13px;
  }
  .btn-deconnexion:hover { background: rgba(255,255,255,0.08); }

  .contenu-admin { padding: 40px 0 80px; }

  .cartes-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 36px;
  }
  .carte-stat {
    background: var(--blanc);
    border: 1px solid var(--ligne);
    border-radius: var(--radius);
    padding: 22px 24px;
  }
  .carte-stat .valeur {
    font-family: var(--display);
    font-size: 30px;
    font-weight: 600;
    color: var(--marine-900);
  }
  .carte-stat .label {
    font-size: 12.5px;
    color: var(--texte-clair);
    margin-top: 4px;
  }

  .panneau {
    background: var(--blanc);
    border: 1px solid var(--ligne);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panneau-filtres {
    padding: 20px 24px;
    border-bottom: 1px solid var(--ligne);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .panneau-filtres input, .panneau-filtres select {
    padding: 10px 14px;
    border: 1px solid var(--ligne);
    border-radius: var(--radius);
    font-size: 13.5px;
    font-family: var(--corps);
    background: var(--marine-50);
  }
  .panneau-filtres input[type="text"] { flex: 1; min-width: 200px; }
  .panneau-filtres input:focus, .panneau-filtres select:focus {
    outline: none; border-color: var(--or-500); background: var(--blanc);
  }
  .compteur-resultats { font-size: 13px; color: var(--texte-clair); margin-left: auto; white-space: nowrap; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--texte-clair);
    font-weight: 600;
    padding: 14px 24px;
    background: var(--marine-50);
    border-bottom: 1px solid var(--ligne);
    white-space: nowrap;
  }
  tbody td {
    padding: 16px 24px;
    border-bottom: 1px solid var(--ligne);
    font-size: 13.5px;
    vertical-align: middle;
  }
  tbody tr:hover { background: var(--marine-50); }
  tbody tr:last-child td { border-bottom: none; }

  .nom-candidat { font-weight: 600; color: var(--marine-900); }
  .badge-domaine {
    display: inline-block;
    background: var(--or-100);
    color: var(--or-500);
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .lien-cv {
    color: var(--marine-900);
    font-weight: 600;
    font-size: 13px;
    border: 1px solid var(--ligne);
    padding: 7px 14px;
    border-radius: var(--radius);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .lien-cv:hover { border-color: var(--or-500); background: var(--or-100); }

  .etat-vide, .etat-chargement {
    text-align: center;
    padding: 70px 24px;
    color: var(--texte-clair);
  }
  .etat-vide h3, .etat-chargement h3 {
    font-family: var(--display);
    color: var(--marine-900);
    font-size: 18px;
    margin-bottom: 8px;
  }

  @media (max-width: 900px) {
    .cartes-stats { grid-template-columns: repeat(2, 1fr); }
    .panneau { overflow-x: auto; }
    table { min-width: 800px; }
  }
</style>
</head>
<body>

<div class="barre-admin">
  <div class="container">
    <div class="marque">
      <div class="marque-sigle">BA</div>
      <div>
        <div class="titre-page">Tableau de bord RH</div>
        <div class="sous-titre">CVthèque — BABN</div>
      </div>
    </div>
    <button class="btn-deconnexion" id="btn-deconnexion">Se déconnecter</button>
  </div>
</div>

<div class="contenu-admin">
  <div class="container">

    <div class="cartes-stats">
      <div class="carte-stat">
        <div class="valeur" id="stat-total">—</div>
        <div class="label">Candidatures reçues</div>
      </div>
      <div class="carte-stat">
        <div class="valeur" id="stat-semaine">—</div>
        <div class="label">Cette semaine</div>
      </div>
      <div class="carte-stat">
        <div class="valeur" id="stat-domaines">—</div>
        <div class="label">Domaines représentés</div>
      </div>
      <div class="carte-stat">
        <div class="valeur" id="stat-affiches">—</div>
        <div class="label">Résultats affichés</div>
      </div>
    </div>

    <div class="panneau">
      <div class="panneau-filtres">
        <input type="text" id="filtre-recherche" placeholder="Rechercher un nom, email...">
        <select id="filtre-domaine">
          <option value="">Tous les domaines</option>
          <option value="Réseau & Exploitation">Réseau &amp; Exploitation</option>
          <option value="Risques & Conformité">Risques &amp; Conformité</option>
          <option value="Finance & Opérations">Finance &amp; Opérations</option>
          <option value="Digital & SI">Digital &amp; Systèmes d'information</option>
          <option value="Ressources humaines">Ressources humaines</option>
          <option value="Stage & Alternance">Stage &amp; Alternance</option>
          <option value="Autre">Autre</option>
        </select>
        <select id="filtre-niveau">
          <option value="">Tous niveaux</option>
          <option value="Débutant">Débutant</option>
          <option value="1-3 ans">1 à 3 ans</option>
          <option value="3-7 ans">3 à 7 ans</option>
          <option value="7+ ans">Plus de 7 ans</option>
        </select>
        <span class="compteur-resultats" id="compteur-resultats"></span>
      </div>

      <div id="zone-tableau">
        <div class="etat-chargement">
          <h3>Chargement des candidatures...</h3>
          <p>Merci de patienter</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/tableau-de-bord.js"></script>
</body>
</html>
